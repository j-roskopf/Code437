name: Build Native Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Intel (dmg)
            runs_on: macos-15-intel
            installer_type: dmg
            artifact_glob: build/jpackage/*.dmg
            artifact_name: code437-macos-intel-dmg
          - label: macOS Apple Silicon (dmg)
            runs_on: macos-15
            installer_type: dmg
            artifact_glob: build/jpackage/*.dmg
            artifact_name: code437-macos-apple-silicon-dmg
          - label: Windows (msi)
            runs_on: windows-latest
            installer_type: msi
            artifact_glob: build/jpackage/*.msi
            artifact_name: code437-windows-msi
          - label: Linux (deb)
            runs_on: ubuntu-latest
            installer_type: deb
            artifact_glob: build/jpackage/*.deb
            artifact_name: code437-linux-deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build native package
        run: ./gradlew clean packageNative -PinstallerType=${{ matrix.installer_type }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
